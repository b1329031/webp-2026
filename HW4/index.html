<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HW4 - 景點觀光展覽資訊</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous">
  <style>
    body { padding: 20px; }
    #csie thead tr { background-color: #4caf7d; color: white; }
    .pagination-bar { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

  <div class="d-flex align-items-center gap-3 mb-2">
    <h4 class="mb-0">景點觀光展覽資訊</h4>
    <input id="search" type="text" class="form-control w-auto" placeholder="搜尋名稱..." onchange="onSearch()">
  </div>

  <table id="csie" class="table table-striped table-hover">
    <thead>
      <tr>
        <th>名稱</th>
        <th>地點</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="pagination-bar">
    <button class="btn btn-outline-secondary btn-sm" onclick="prevPage()">上一頁</button>
    <span id="pageInfo">1 / 1 頁</span>
    <button class="btn btn-outline-secondary btn-sm" onclick="nextPage()">下一頁</button>
  </div>

  <script>
    var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
    var fullDataset = [];
    var filteredDataset = [];
    var currentPage = 1;
    var itemsPerPage = 10;

    var xhr = new XMLHttpRequest();
    xhr.open('GET', openUrl, true);
    xhr.send();
    xhr.onreadystatechange = function() {
      if (this.readyState == 4 && this.status == 200) {
        fullDataset = JSON.parse(this.responseText);
        filteredDataset = fullDataset;
        renderTable();
        updatePagination();
      }
    };

    function onSearch() {
      var keyword = document.getElementById('search').value;
      filteredDataset = fullDataset.filter(function(data) {
        return data['title'].includes(keyword);
      });
      currentPage = 1;
      renderTable();
      updatePagination();
    }

    function renderTable() {
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      var start = (currentPage - 1) * itemsPerPage;
      var end = Math.min(start + itemsPerPage, filteredDataset.length);
      for (var i = start; i < end; i++) {
        var data = filteredDataset[i];
        var row = tbody.insertRow(-1);
        row.insertCell(0).innerHTML = data['title'];
        var location = (data['showInfo'] && data['showInfo'][0]) ? data['showInfo'][0]['location'] : '';
        row.insertCell(1).innerHTML = location;
      }
    }

    function updatePagination() {
      var totalPages = Math.max(1, Math.ceil(filteredDataset.length / itemsPerPage));
      document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages + ' 頁';
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
        updatePagination();
      }
    }

    function nextPage() {
      var totalPages = Math.ceil(filteredDataset.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderTable();
        updatePagination();
      }
    }
  </script>
</body>
</html>
