<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
    function repeatchar(count, arg_char) {
        let result = "";
        for (let i = 0; i < count; i++) {
            result += arg_char;
        }
        return result;
    }

    function tree(n) {
        // 把整棵樹先拼成一個超大的字串
        let fullTree = "";

        // 畫樹冠
        for (let i = 0; i < n; i++) {
            let spaces = repeatchar(n - 1 - i, ' ');
            let stars = repeatchar(2 * i + 1, '*');
            fullTree += spaces + stars + "\n"; // \n 代表換行
        }

        // 畫樹幹
        for (let i = 0; i < 3; i++) {
            let spaces = repeatchar(n - 1, ' ');
            fullTree += spaces + "*" + "\n";
        }

        console.log(fullTree);
    }

    tree(4);
</script>
